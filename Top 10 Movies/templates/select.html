<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Movie</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-white">
    <div class="container mt-5">
        <h2 class="text-center mb-4">Select a Movie</h2>
        <ul class="list-group">
            {% for movie in options %}
            <li class="list-group-item bg-secondary text-white d-flex justify-content-between align-items-center">
                {{ movie.title }} ({{ movie.release_date.split('-')[0] if movie.release_date else "N/A" }})
                <a href="/find?id={{ movie.id }}" class="btn btn-light btn-sm">Add</a>
            </li>
            {% endfor %}
        </ul>
    </div>
</body>
</html>
