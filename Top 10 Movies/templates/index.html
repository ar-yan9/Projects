<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top 10 Movies</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body class="bg-dark text-white">
    <div class="container mt-5">
        <h1 class="text-center mb-5">🎬 My Top 10 Movies</h1>
        <div class="row">
            {% for movie in movies %}
            <div class="col-md-4 mb-4">
                <div class="card bg-secondary text-white h-100">
                    <img src="{{ movie.img_url }}" class="card-img-top" alt="{{ movie.title }}">
                    <div class="card-body">
                        <h5 class="card-title">#{{ movie.ranking }} {{ movie.title }}</h5>
                        <p class="card-text"><small>{{ movie.year }}</small></p>
                        <p class="card-text">{{ movie.description[:100] }}...</p>
                        <p class="card-text">⭐ {{ movie.rating }} | {{ movie.review }}</p>
                        <a href="/edit?id={{ movie.id }}" class="btn btn-warning btn-sm">Update</a>
                        <a href="/delete?id={{ movie.id }}" class="btn btn-danger btn-sm">Delete</a>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
        <div class="text-center mt-4">
            <a href="/add" class="btn btn-light btn-lg">Add Movie</a>
        </div>
    </div>
</body>
</html>
