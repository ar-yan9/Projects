<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Cafes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">☕ Coffee & Wifi</a>
            <a href="/add" class="btn btn-outline-light">Add Cafe</a>
        </div>
    </nav>
    <div class="container mt-5">
        <h1 class="mb-4">All Cafes</h1>
        <table class="table table-striped table-hover shadow">
            <thead class="table-dark">
                <tr>
                    {% for header in cafes[0] %}
                        <th>{{ header }}</th>
                    {% endfor %}
                </tr>
            </thead>
            <tbody>
                {% for cafe in cafes[1:] %}
                    <tr>
                        {% for data in cafe %}
                            <td>{{ data }}</td>
                        {% endfor %}
                    </tr>
                {% endfor %}
            </tbody>
        </table>
        <a href="/add" class="btn btn-danger mt-3">Add a New Cafe</a>
    </div>
</body>
</html>
